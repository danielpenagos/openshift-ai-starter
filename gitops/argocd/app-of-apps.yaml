apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openshift-ai-starter
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/<YOUR_ORG>/openshift-ai-starter.git
    targetRevision: main
    path: gitops/argocd
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
