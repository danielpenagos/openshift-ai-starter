apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: operators-instances
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/danielpenagos/openshift-ai-starter.git
    targetRevision: main
    path: gitops/base/operators-instances
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: operator.knative.dev
      kind: KnativeServing
      jsonPointers:
        - /metadata/finalizers
        - /status
    - group: nvidia.com
      kind: ClusterPolicy
      jsonPointers:
        - /metadata/finalizers
        - /status
    - group: nfd.openshift.io
      kind: NodeFeatureDiscovery
      jsonPointers:
        - /metadata/finalizers
        - /status
