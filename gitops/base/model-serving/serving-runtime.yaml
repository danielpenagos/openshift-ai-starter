apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-runtime
  namespace: llm-serving
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    openshift.io/display-name: "vLLM ServingRuntime for KServe"
    argocd.argoproj.io/sync-wave: "2"
spec:
  builtInAdapter:
    modelLoadingTimeoutMillis: 90000
  containers:
    - name: kserve-container
      image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3
      command:
        - vllm
        - serve
      args:
        - /mnt/models/
        - --served-model-name
        - mistral-7b-instruct
        - --port
        - "8080"
        - --max-model-len
        - "16384"
        - --dtype
        - half
        - --quantization
        - gptq
        - --trust-remote-code
        - --gpu-memory-utilization
        - "0.9"
        - --enforce-eager
        - --enable-auto-tool-choice
        - --tool-call-parser
        - mistral
      env:
        - name: HOME
          value: /tmp
        - name: VLLM_USE_V1
          value: "0"
      ports:
        - containerPort: 8080
          name: http1
          protocol: TCP
      resources:
        limits:
          nvidia.com/gpu: "1"
        requests:
          cpu: 500m
          memory: 2Gi
          nvidia.com/gpu: "1"
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: pytorch
