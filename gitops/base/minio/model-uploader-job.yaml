apiVersion: batch/v1
kind: Job
metadata:
  name: model-uploader
  namespace: minio
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: model-uploader
    spec:
      restartPolicy: Never
      securityContext:
        fsGroup: 0
      containers:
        - name: uploader
          image: python:3.11-slim
          env:
            - name: HOME
              value: /tmp
            - name: HF_HOME
              value: /tmp/.cache/huggingface
            - name: HF_MODEL
              value: TheBloke/Mistral-7B-Instruct-v0.2-AWQ
            - name: MINIO_PATH
              value: mistral-7b-instruct-awq
            - name: MINIO_ENDPOINT
              value: http://minio.minio.svc.cluster.local:9000
            - name: MINIO_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_USER
            - name: MINIO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_PASSWORD
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "=== Installing dependencies ==="
              pip install --no-cache-dir huggingface_hub[hf_xet] -t /tmp/pip-packages
              export PYTHONPATH=/tmp/pip-packages:$PYTHONPATH
              export PATH=/tmp/pip-packages/bin:$PATH

              echo "=== Installing MinIO client ==="
              python -c "import urllib.request; urllib.request.urlretrieve('https://dl.min.io/client/mc/release/linux-amd64/mc', '/tmp/mc')"
              chmod +x /tmp/mc

              echo "=== Downloading model: ${HF_MODEL} ==="
              hf download ${HF_MODEL} --local-dir /models/download

              echo "=== Configuring MinIO client ==="
              /tmp/mc alias set minio ${MINIO_ENDPOINT} ${MINIO_USER} ${MINIO_PASSWORD}

              echo "=== Creating bucket (if needed) ==="
              /tmp/mc mb --ignore-existing minio/models

              echo "=== Uploading model to MinIO ==="
              /tmp/mc cp --recursive /models/download/ minio/models/${MINIO_PATH}/

              echo "=== Verifying upload ==="
              /tmp/mc ls minio/models/${MINIO_PATH}/

              echo "=== Done! ==="
          volumeMounts:
            - name: model-storage
              mountPath: /models
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: model-download
