apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Base operators (NFD, GPU, cert-manager, OpenShift AI)
  - ../../base/operators/nfd
  - ../../base/operators/gpu-operator
  - ../../base/operators/openshift-ai
  # v2-specific operators (Serverless + Service Mesh instead of cert-manager)
  - operators/serverless
  - operators/servicemesh
  # Operator instances (includes KnativeServing)
  - operators-instances
  # Platform
  - ../../base/datasciencecluster
  - ../../base/minio
  - ../../base/model-serving
  - ../../base/open-webui

patches:
  # RHOAI v2 channel
  - path: patches/openshift-ai-subscription.yaml
  # DataScienceCluster v1 API with Serverless/ModelMesh
  - path: patches/datasciencecluster.yaml
  # InferenceService with Knative/Istio annotations
  - path: patches/inference-service.yaml
  # ServingRuntime with upstream vLLM image
  - path: patches/serving-runtime.yaml
